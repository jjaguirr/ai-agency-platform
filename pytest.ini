[tool:pytest]
# Modern AI Agent Testing Configuration
# Optimized for Executive Assistant conversational testing

# Test discovery
python_files = test_*.py *_test.py test_*.py
python_classes = Test* *Tests
python_functions = test_*

# Test execution
minversion = 7.0
testpaths = tests
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80
    --durations=10
    --asyncio-mode=auto
    --timeout=30

# Markers for AI agent testing
markers =
    unit: Unit tests for individual components
    integration: Integration tests requiring services
    acceptance: End-to-end acceptance tests with scenarios
    agent_test: Tests using AI agent evaluation frameworks
    evaluation: Tests using LLM/Agent judges for evaluation
    performance: Performance benchmark tests
    conversation: Conversational AI testing
    scenario: Scenario-driven testing
    slow: Tests that take longer than 10 seconds
    mock: Tests using mocked services
    real_api: Tests requiring real API calls (OpenAI, etc.)
    memory: Tests for memory and context persistence
    cross_channel: Tests for cross-channel conversation continuity

# Test filtering
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Async testing configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage configuration
[coverage:run]
source = src
omit = 
    */tests/*
    */conftest.py
    */test_*.py
    */__pycache__/*
    */migrations/*
    */venv/*
    */env/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

# HTML coverage report
[coverage:html]
directory = htmlcov
title = AI Agency Platform - Executive Assistant Coverage