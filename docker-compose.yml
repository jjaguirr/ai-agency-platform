# AI Agency Platform - Consolidated Development Stack
# Core services for local development and testing
# Usage: docker compose up -d

services:
  # Core Database - PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: ai-agency-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mcphub}
      POSTGRES_USER: ${POSTGRES_USER:-mcphub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcphub_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcphub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-agency-network

  # Cache & Session Store - Redis
  redis:
    image: redis:7-alpine
    container_name: ai-agency-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - ai-agency-network

  # Vector Database for Mem0 - Qdrant
  qdrant:

    image: qdrant/qdrant:v1.11.0

    container_name: ai-agency-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=3", "--spider", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - ai-agency-network

  # Graph Database for Mem0 - Neo4j
  neo4j:
    image: neo4j:5.15-community
    container_name: ai-agency-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/neo4j_password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=256m
      # Per-customer database support
      - NEO4J_server_config_strict__validation_enabled=false
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4j_password", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - ai-agency-network

  # Memory Infrastructure Monitor
  memory-monitor:
    build:
      context: ./src/memory
      dockerfile: Dockerfile.monitor
    container_name: ai-agency-memory-monitor
    ports:
      - "8084:8080"
    environment:
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-mcphub}:${POSTGRES_PASSWORD:-mcphub_password}@postgres:5432/${POSTGRES_DB:-mcphub}
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URL=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j_password
      - MONITORING_INTERVAL=30
      - SLA_ENFORCEMENT=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./logs/memory:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ai-agency-network

  # Security API - Development Mode (Bypass Llama Guard)
  security-api:
    build:
      context: ./src/security
      dockerfile: Dockerfile.llamaguard-api
    container_name: ai-agency-security-api
    ports:
      - "8083:8080"
    environment:
      - LLAMAGUARD_ENABLED=${LLAMAGUARD_ENABLED:-false}  # Bypass mode for development
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-mcphub}:${POSTGRES_PASSWORD:-mcphub_password}@postgres:5432/${POSTGRES_DB:-mcphub}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config/security/safety-policies.yaml:/app/config/safety-policies.yaml:ro
      - ./logs/security:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ai-agency-network

  # Security Proxy - Rate Limiting and Basic Protection
  security-proxy:
    image: nginx:1.25-alpine
    container_name: ai-agency-security-proxy
    ports:
      - "8080:80"
    volumes:
      - ./config/nginx/security-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - security-api
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ai-agency-network

  # LangFuse Observability - Server
  langfuse-server:
    image: langfuse/langfuse:2
    container_name: ai-agency-langfuse-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mcphub}:${POSTGRES_PASSWORD:-mcphub_password}@postgres:5432/langfuse
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-nextauth-secret}
      - SALT=${SALT:-dev-salt-value}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - TELEMETRY_ENABLED=${TELEMETRY_ENABLED:-true}
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=${LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES:-true}
      # AI Agency Platform specific configuration
      - LANGFUSE_DEFAULT_PROJECT_ID=ai-agency-platform
      - LANGFUSE_DEFAULT_PROJECT_NAME=AI Agency Platform
      # Object Storage (MinIO)
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-minioadmin}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-minioadmin}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-langfuse}
      - S3_REGION=${S3_REGION:-us-east-1}
      # Redis Configuration
      - REDIS_CONNECTION_STRING=redis://redis:6379/1
    networks:
      - ai-agency-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # LangFuse Background Worker
  langfuse-worker:
    image: langfuse/langfuse:2
    container_name: ai-agency-langfuse-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["node", "--loader", "tsx/esm", "./src/worker.ts"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mcphub}:${POSTGRES_PASSWORD:-mcphub_password}@postgres:5432/langfuse
      - REDIS_CONNECTION_STRING=redis://redis:6379/1
      # Object Storage (MinIO)
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-minioadmin}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-minioadmin}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-langfuse}
      - S3_REGION=${S3_REGION:-us-east-1}
    networks:
      - ai-agency-network
    restart: unless-stopped

  # Object Storage - MinIO
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: ai-agency-minio
    restart: unless-stopped
    command: server /data --console-address ":9090"
    healthcheck:
      test: ["CMD", "timeout", "5s", "bash", "-c", "</dev/tcp/localhost/9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY_ID:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9090"  # MinIO Console
    networks:
      - ai-agency-network

  # WhatsApp Webhook Service - Centralized message routing
  whatsapp-webhook:
    build:
      context: .
      dockerfile: src/webhook/Dockerfile.webhook-service
    container_name: ai-agency-whatsapp-webhook
    ports:
      - "8000:8000"
    environment:
      - WHATSAPP_BUSINESS_TOKEN=${WHATSAPP_BUSINESS_TOKEN}
      - WHATSAPP_BUSINESS_PHONE_ID=${WHATSAPP_BUSINESS_PHONE_ID}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - WHATSAPP_WEBHOOK_SECRET=${WHATSAPP_WEBHOOK_SECRET}
      - REDIS_URL=redis://redis:6379
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ENVIRONMENT=development
      - FLASK_DEBUG=true
      - ENABLE_IP_ALLOWLIST=false  # Disabled for local development
      - ENFORCE_WEBHOOK_SECRET=false  # Disabled for local development
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro  # Read-only source mount for development
      - ./logs/webhook:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ai-agency-network

  # EA Client Simulator - For development and testing
  ea-client-simulator:
    build:
      context: .
      dockerfile: src/communication/Dockerfile.ea-bridge
    container_name: ai-agency-ea-simulator
    ports:
      - "8001:8001"  # MCP server port
    environment:
      - CUSTOMER_ID=test-customer
      - WHATSAPP_PHONE_NUMBER=19496212077  # Your test phone number
      - WHATSAPP_WEBHOOK_SERVICE_URL=http://whatsapp-webhook:8000
      - EA_AUTH_TOKEN=test-auth-token-123
      - MCP_PORT=8001
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-mcphub}:${POSTGRES_PASSWORD:-mcphub_password}@postgres:5432/${POSTGRES_DB:-mcphub}
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      whatsapp-webhook:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro  # Read-only source mount for development
      - ./logs/ea-client:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ai-agency-network


volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  minio_data:
    driver: local

networks:
  ai-agency-network:
    driver: bridge
    name: ai-agency-network

# Development Configuration Notes:
#
# 1. Service Endpoints:
#    - PostgreSQL: localhost:5432
#    - Redis: localhost:6379
#    - Qdrant Vector DB: localhost:6333 (HTTP), localhost:6334 (gRPC)
#    - Neo4j Graph DB: localhost:7474 (Browser), localhost:7687 (Bolt)
#    - Memory Monitor: localhost:8084
#    - Security API: localhost:8083
#    - Security Proxy: localhost:8080
#    - LangFuse: localhost:3000
#    - MinIO: localhost:9000 (API), localhost:9001 (Console)
#
# 2. Database Setup:
#    - Primary database: mcphub
#    - LangFuse database: langfuse (auto-created)
#    - Default credentials: mcphub/mcphub_password
#
# 3. Security Configuration:
#    - Llama Guard disabled by default (LLAMAGUARD_ENABLED=false)
#    - JWT secret configurable via environment
#    - Basic rate limiting via nginx proxy
#
# 4. Development Features:
#    - All services use development-friendly defaults
#    - Persistent volumes for data retention
#    - Health checks for service reliability
#    - Shared network for easy inter-service communication
#
# 5. Environment File:
#    - Copy .env.example to .env and customize
#    - Required for production deployment
#    - Optional for development (uses defaults)
#
# 6. Getting Started:
#    - docker compose up -d
#    - Access LangFuse at http://localhost:3000
#    - Access MinIO Console at http://localhost:9001
#    - Security API available at http://localhost:8083