# AI Agency Platform - Production Per-Customer Infrastructure Template
# This template is used by the Infrastructure Orchestrator with intelligent port allocation
# Each customer gets a dedicated stack with complete isolation and dynamic port management
#
# Usage: 
# export CUSTOMER_ID=customer_12345
# export CUSTOMER_TIER=professional  
# docker compose -f docker-compose.production.yml up -d
#
# Variables dynamically allocated by Infrastructure Orchestrator:
# ${CUSTOMER_ID} - Unique customer identifier
# ${MCP_PORT} - Auto-allocated MCP server port (30000-30999)
# ${POSTGRES_PORT} - Auto-allocated PostgreSQL port (31000-31999)  
# ${REDIS_PORT} - Auto-allocated Redis port (32000-32999)
# ${TIER_MEMORY_LIMIT} - Memory limit based on customer tier
# ${TIER_CPU_LIMIT} - CPU limit based on customer tier
# ${SECURE_PASSWORD} - Auto-generated secure password for databases
# ${JWT_SECRET} - Auto-generated JWT secret
# ${ENCRYPTION_KEY} - Auto-generated encryption key


services:
  # Customer-Dedicated PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres-${CUSTOMER_ID}
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: customer_${CUSTOMER_ID}
      POSTGRES_USER: customer_${CUSTOMER_ID}
      POSTGRES_PASSWORD: ${SECURE_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Production optimizations
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.9
      POSTGRES_WAL_BUFFERS: 16MB
    volumes:
      - ./customer-volumes/${CUSTOMER_ID}/postgres:/var/lib/postgresql/data
      - ./config/postgres/customer-init.sql:/docker-entrypoint-initdb.d/01-customer-init.sql:ro
      - ./config/postgres/production.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - customer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer_${CUSTOMER_ID} -d customer_${CUSTOMER_ID}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${TIER_MEMORY_LIMIT}
          cpus: '${TIER_CPU_LIMIT}'
        reservations:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=postgres"
      - "ai-agency.tier=${CUSTOMER_TIER}"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Customer-Dedicated Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: redis-${CUSTOMER_ID}
    ports:
      - "${REDIS_PORT}:6379"
    command: |
      redis-server 
      --appendonly yes 
      --maxmemory 1gb 
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 300
      --timeout 300
    volumes:
      - ./customer-volumes/${CUSTOMER_ID}/redis:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - customer-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${TIER_MEMORY_LIMIT}
          cpus: '${TIER_CPU_LIMIT}'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=redis"
      - "ai-agency.tier=${CUSTOMER_TIER}"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Customer-Dedicated MCP Server with EA Integration
  mcp-server:
    build:
      context: ./src/agents
      dockerfile: Dockerfile.mcp-server
      args:
        - CUSTOMER_ID=${CUSTOMER_ID}
        - CUSTOMER_TIER=${CUSTOMER_TIER}
    image: ai-agency-mcp-server:${CUSTOMER_ID}
    container_name: mcp-server-${CUSTOMER_ID}
    ports:
      - "${MCP_PORT}:3000"
    environment:
      # Customer isolation
      CUSTOMER_ID: ${CUSTOMER_ID}
      CUSTOMER_TIER: ${CUSTOMER_TIER}
      MCP_PORT: 3000
      
      # Database connections (customer-specific)
      DATABASE_URL: postgresql://customer_${CUSTOMER_ID}:${SECURE_PASSWORD}@postgres-${CUSTOMER_ID}:5432/customer_${CUSTOMER_ID}
      REDIS_URL: redis://redis-${CUSTOMER_ID}:6379

      # EA configuration
      EA_ENABLED: true
      EA_PERSONALITY: professional
      EA_CHANNELS: phone,whatsapp,email
      EA_AUTONOMOUS_MEMORY: true
      EA_CROSS_CHANNEL_CONTINUITY: true
      
      # Production settings
      NODE_ENV: production
      LOG_LEVEL: info
      ENABLE_METRICS: true
      METRICS_PORT: 9091
      
      # Security
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      
      # AI Provider settings (customer-configurable)
      AI_PROVIDER: openai
      AI_MODEL: gpt-4o-mini
      AI_TEMPERATURE: 0.1
      
      # Rate limiting based on tier
      RATE_LIMIT_RPM: ${TIER_RATE_LIMIT_RPM}
      RATE_LIMIT_CONCURRENT: ${TIER_CONCURRENT_REQUESTS}
      
      # Resource monitoring
      MEMORY_LIMIT_MB: ${TIER_MEMORY_LIMIT_MB}
      CPU_LIMIT_PERCENT: ${TIER_CPU_LIMIT_PERCENT}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./customer-data/${CUSTOMER_ID}:/app/data
      - ./customer-workflows/${CUSTOMER_ID}:/app/workflows
      - ./customer-configs/${CUSTOMER_ID}:/app/config
      - ./logs/mcp/${CUSTOMER_ID}:/app/logs
      - ./config/security/customer-policies.yaml:/app/config/security-policies.yaml:ro
    networks:
      - customer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: ${TIER_MEMORY_LIMIT}
          cpus: '${TIER_CPU_LIMIT}'
        reservations:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=mcp-server"
      - "ai-agency.tier=${CUSTOMER_TIER}"
      - "ai-agency.version=${APP_VERSION}"
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"

# Customer-Dedicated Volumes for Data Persistence
# Using direct bind mounts instead of named volumes for better customer isolation

# Customer-Dedicated Network for Complete Isolation
networks:
  customer-network:
    driver: bridge
    name: ${CUSTOMER_ID}-network
    ipam:
      driver: default
      config:
        - subnet: 172.${CUSTOMER_SUBNET}.0.0/16
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.isolation=per-customer"

# Production Configuration Notes:
#
# 1. Per-Customer Isolation:
#    - Dedicated containers for each customer with unique naming
#    - Isolated networks preventing cross-customer communication  
#    - Separate databases and data volumes per customer
#    - Customer-specific ports to avoid conflicts
#
# 2. Resource Management:
#    - Tier-based resource limits (CPU, memory, storage)
#    - Resource reservations to guarantee minimum resources
#    - Auto-scaling support through Docker Swarm or Kubernetes
#    - Resource monitoring and alerting per customer
#
# 3. Security & Compliance:
#    - Customer data isolation at all levels
#    - Encrypted connections between services
#    - Audit logging for compliance (GDPR, SOC2)
#    - Customer-specific security policies
#
# 4. Production Monitoring:
#    - Health checks for all services
#    - Prometheus metrics collection per customer
#    - Structured logging with customer ID tagging
#    - SLA monitoring and alerting
#
# 5. Backup & Recovery:
#    - Customer data backup to isolated storage
#    - Point-in-time recovery capabilities
#    - Disaster recovery procedures per customer
#    - Data export for customer portability
#
# 6. Deployment Process:
#    - Automated provisioning via Customer Provisioning Orchestrator
#    - Zero-downtime updates using blue-green deployments
#    - Rollback capabilities on deployment failures  
#    - Customer-specific configuration management
#
# 7. Scaling Strategy:
#    - Horizontal scaling: Add more customer instances
#    - Vertical scaling: Upgrade customer tier resources
#    - Auto-scaling based on customer usage patterns
#    - Cost optimization through resource right-sizing