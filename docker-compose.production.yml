# AI Agency Platform - Production Per-Customer Infrastructure Template
# Enhanced production deployment with comprehensive monitoring, security, and observability
# This template is used by the Customer Provisioning Orchestrator to deploy isolated customer environments
# Each customer gets a dedicated stack with production-grade services and monitoring
#
# Usage:
# export CUSTOMER_ID=customer_12345
# export CUSTOMER_TIER=professional
# docker compose -f docker-compose.production.yml up -d
#
# Variables replaced by provisioning orchestrator:
# ${CUSTOMER_ID} - Unique customer identifier
# ${MCP_PORT} - Dedicated MCP server port (30000-30999)
# ${POSTGRES_PORT} - Dedicated PostgreSQL port (31000-31999)
# ${REDIS_PORT} - Dedicated Redis port (32000-32999)
# ${QDRANT_PORT} - Dedicated Qdrant port (33000-33999)
# ${NEO4J_PORT} - Dedicated Neo4j port (34000-34999)
# ${MEMORY_MONITOR_PORT} - Dedicated Memory Monitor port (35000-35999)
# ${PROMETHEUS_PORT} - Dedicated Prometheus port (36000-36999)
# ${GRAFANA_PORT} - Dedicated Grafana port (37000-37999)
# ${JAEGER_UI_PORT} - Dedicated Jaeger UI port (38000-38999)
# ${JAEGER_COLLECTOR_PORT} - Dedicated Jaeger Collector port (39000-39999)
# ${NGINX_PORT} - Dedicated Nginx port (40000-40999)
# ${NGINX_SSL_PORT} - Dedicated Nginx SSL port (41000-41999)
# ${LOKI_PORT} - Dedicated Loki port (42000-42999)
# ${TIER_MEMORY_LIMIT} - Memory limit based on customer tier
# ${TIER_CPU_LIMIT} - CPU limit based on customer tier
# ${SECURE_PASSWORD} - Generated secure password for databases

version: '3.8'

services:
  # Customer-Dedicated PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres-${CUSTOMER_ID}
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: customer_${CUSTOMER_ID}
      POSTGRES_USER: customer_${CUSTOMER_ID}
      POSTGRES_PASSWORD: ${SECURE_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Production optimizations
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.9
      POSTGRES_WAL_BUFFERS: 16MB
    volumes:
      - postgres_data_${CUSTOMER_ID}:/var/lib/postgresql/data
      - ./config/postgres/customer-init.sql:/docker-entrypoint-initdb.d/01-customer-init.sql:ro
      - ./config/postgres/production.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - customer-${CUSTOMER_ID}-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer_${CUSTOMER_ID} -d customer_${CUSTOMER_ID}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${TIER_MEMORY_LIMIT}
          cpus: '${TIER_CPU_LIMIT}'
        reservations:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=postgres"
      - "ai-agency.tier=${CUSTOMER_TIER}"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Customer-Dedicated Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: redis-${CUSTOMER_ID}
    ports:
      - "${REDIS_PORT}:6379"
    command: |
      redis-server 
      --appendonly yes 
      --maxmemory 1gb 
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 300
      --timeout 300
    volumes:
      - redis_data_${CUSTOMER_ID}:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - customer-${CUSTOMER_ID}-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${TIER_MEMORY_LIMIT}
          cpus: '${TIER_CPU_LIMIT}'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=redis"
      - "ai-agency.tier=${CUSTOMER_TIER}"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Customer-Dedicated Qdrant Vector Database for Mem0
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: qdrant-${CUSTOMER_ID}
    ports:
      - "${QDRANT_PORT}:6333"
      - "${QDRANT_GRPC_PORT}:6334"
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
      QDRANT__SERVICE__MAX_REQUEST_SIZE_MB: 32
      QDRANT__CLUSTER__ENABLED: false
      # Production performance tuning
      QDRANT__STORAGE__OPTIMIZERS__DEFAULT_SEGMENT_NUMBER: 2
      QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB: 200000
      QDRANT__STORAGE__OPTIMIZERS__INDEXING_THRESHOLD_KB: 20000
    volumes:
      - qdrant_data_${CUSTOMER_ID}:/qdrant/storage
      - ./config/qdrant/production.yaml:/qdrant/config/production.yaml:ro
    networks:
      - customer-${CUSTOMER_ID}-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=3", "--spider", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: ${TIER_MEMORY_LIMIT}
          cpus: '${TIER_CPU_LIMIT}'
        reservations:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=qdrant"
      - "ai-agency.tier=${CUSTOMER_TIER}"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Customer-Dedicated Neo4j Graph Database for Mem0 Relationships
  neo4j:
    image: neo4j:5.15-community
    container_name: neo4j-${CUSTOMER_ID}
    ports:
      - "${NEO4J_PORT}:7474"         # Browser interface
      - "${NEO4J_BOLT_PORT}:7687"    # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${SECURE_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
      # Production memory settings based on tier
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 256m
      # Customer isolation
      NEO4J_server_config_strict__validation_enabled: false
      NEO4J_dbms_default__database: customer_${CUSTOMER_ID}_graph
      # Performance tuning
      NEO4J_dbms_checkpoint_interval_time: 5m
      NEO4J_dbms_checkpoint_interval_tx: 100000
      NEO4J_dbms_transaction_timeout: 60s
      NEO4J_dbms_tx_log_rotation_retention_policy: "7 days"
    volumes:
      - neo4j_data_${CUSTOMER_ID}:/data
      - neo4j_logs_${CUSTOMER_ID}:/logs
      - neo4j_import_${CUSTOMER_ID}:/var/lib/neo4j/import
      - ./config/neo4j/neo4j.conf:/var/lib/neo4j/conf/neo4j.conf:ro
    networks:
      - customer-${CUSTOMER_ID}-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${SECURE_PASSWORD}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${TIER_MEMORY_LIMIT}
          cpus: '${TIER_CPU_LIMIT}'
        reservations:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=neo4j"
      - "ai-agency.tier=${CUSTOMER_TIER}"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Customer-Dedicated Memory Performance Monitor
  memory-monitor:
    build:
      context: ./src/memory
      dockerfile: Dockerfile.monitor
      args:
        - CUSTOMER_ID=${CUSTOMER_ID}
    image: ai-agency-memory-monitor:${CUSTOMER_ID}
    container_name: memory-monitor-${CUSTOMER_ID}
    ports:
      - "${MEMORY_MONITOR_PORT}:8080"
    environment:
      CUSTOMER_ID: ${CUSTOMER_ID}
      POSTGRES_URL: postgresql://customer_${CUSTOMER_ID}:${SECURE_PASSWORD}@postgres-${CUSTOMER_ID}:5432/customer_${CUSTOMER_ID}
      REDIS_URL: redis://redis-${CUSTOMER_ID}:6379
      QDRANT_URL: http://qdrant-${CUSTOMER_ID}:6333
      NEO4J_URL: neo4j://neo4j-${CUSTOMER_ID}:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${SECURE_PASSWORD}
      MONITORING_INTERVAL: 30
      SLA_ENFORCEMENT: true
      # Production monitoring settings
      METRICS_RETENTION_DAYS: 30
      ALERT_THRESHOLD_MEMORY: 0.85
      ALERT_THRESHOLD_CPU: 0.80
      ALERT_THRESHOLD_RESPONSE_TIME_MS: 500
      PROMETHEUS_ENABLED: true
      PROMETHEUS_PORT: 9090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./logs/memory/${CUSTOMER_ID}:/app/logs
      - ./config/monitoring/alerts.yml:/app/config/alerts.yml:ro
    networks:
      - customer-${CUSTOMER_ID}-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=memory-monitor" 
      - "ai-agency.tier=${CUSTOMER_TIER}"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Customer-Dedicated MCP Server with EA Integration
  mcp-server:
    build:
      context: ./src/agents
      dockerfile: Dockerfile.mcp-server
      args:
        - CUSTOMER_ID=${CUSTOMER_ID}
        - CUSTOMER_TIER=${CUSTOMER_TIER}
    image: ai-agency-mcp-server:${CUSTOMER_ID}
    container_name: mcp-server-${CUSTOMER_ID}
    ports:
      - "${MCP_PORT}:3000"
    environment:
      # Customer isolation
      CUSTOMER_ID: ${CUSTOMER_ID}
      CUSTOMER_TIER: ${CUSTOMER_TIER}
      MCP_PORT: 3000
      
      # Database connections (customer-specific)
      DATABASE_URL: postgresql://customer_${CUSTOMER_ID}:${SECURE_PASSWORD}@postgres-${CUSTOMER_ID}:5432/customer_${CUSTOMER_ID}
      REDIS_URL: redis://redis-${CUSTOMER_ID}:6379
      QDRANT_URL: http://qdrant-${CUSTOMER_ID}:6333
      NEO4J_URL: neo4j://neo4j-${CUSTOMER_ID}:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${SECURE_PASSWORD}
      
      # Memory integration
      MEMORY_MONITOR_URL: http://memory-monitor-${CUSTOMER_ID}:8080
      MEM0_COLLECTION_NAME: customer_${CUSTOMER_ID}_memories
      MEM0_GRAPH_DATABASE: customer_${CUSTOMER_ID}_graph
      
      # EA configuration
      EA_ENABLED: true
      EA_PERSONALITY: professional
      EA_CHANNELS: phone,whatsapp,email
      EA_AUTONOMOUS_MEMORY: true
      EA_CROSS_CHANNEL_CONTINUITY: true
      
      # Production settings
      NODE_ENV: production
      LOG_LEVEL: info
      ENABLE_METRICS: true
      METRICS_PORT: 9091
      
      # Security
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      
      # AI Provider settings (customer-configurable)
      AI_PROVIDER: openai
      AI_MODEL: gpt-4o-mini
      AI_TEMPERATURE: 0.1
      
      # Rate limiting based on tier
      RATE_LIMIT_RPM: ${TIER_RATE_LIMIT_RPM}
      RATE_LIMIT_CONCURRENT: ${TIER_CONCURRENT_REQUESTS}
      
      # Resource monitoring
      MEMORY_LIMIT_MB: ${TIER_MEMORY_LIMIT_MB}
      CPU_LIMIT_PERCENT: ${TIER_CPU_LIMIT_PERCENT}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      memory-monitor:
        condition: service_healthy
    volumes:
      - ./customer-data/${CUSTOMER_ID}:/app/data
      - ./customer-workflows/${CUSTOMER_ID}:/app/workflows
      - ./customer-configs/${CUSTOMER_ID}:/app/config
      - ./logs/mcp/${CUSTOMER_ID}:/app/logs
      - ./config/security/customer-policies.yaml:/app/config/security-policies.yaml:ro
    networks:
      - customer-${CUSTOMER_ID}-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: ${TIER_MEMORY_LIMIT}
          cpus: '${TIER_CPU_LIMIT}'
        reservations:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=mcp-server"
      - "ai-agency.tier=${CUSTOMER_TIER}"
      - "ai-agency.version=${APP_VERSION}"
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "5"

  # Customer-Dedicated Security & Compliance Service
  security-service:
    build:
      context: ./src/security
      dockerfile: Dockerfile.customer-security
      args:
        - CUSTOMER_ID=${CUSTOMER_ID}
    image: ai-agency-security:${CUSTOMER_ID}
    container_name: security-${CUSTOMER_ID}
    environment:
      CUSTOMER_ID: ${CUSTOMER_ID}
      LLAMAGUARD_ENABLED: true
      SECURITY_LEVEL: production
      POSTGRES_URL: postgresql://customer_${CUSTOMER_ID}:${SECURE_PASSWORD}@postgres-${CUSTOMER_ID}:5432/customer_${CUSTOMER_ID}
      REDIS_URL: redis://redis-${CUSTOMER_ID}:6379
      JWT_SECRET: ${JWT_SECRET}
      GDPR_COMPLIANCE: true
      DATA_RETENTION_DAYS: ${TIER_DATA_RETENTION_DAYS}
      AUDIT_LOG_ENABLED: true
      # Vault integration for secrets
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN_PATH: ${VAULT_TOKEN_PATH}
      # Security monitoring
      SENTRY_DSN: ${VAULT_SECRET_SENTRY_DSN}
      SECURITY_SCAN_INTERVAL: 300
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config/security/customer-${CUSTOMER_ID}.yaml:/app/config/security.yaml:ro
      - ./logs/security/${CUSTOMER_ID}:/app/logs
      - /var/run/vault:/var/run/vault:ro
    networks:
      - customer-${CUSTOMER_ID}-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=security"
      - "ai-agency.tier=${CUSTOMER_TIER}"

  # Customer-Dedicated Prometheus for Metrics Collection
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus-${CUSTOMER_ID}
    ports:
      - "${PROMETHEUS_PORT}:9090"
    environment:
      CUSTOMER_ID: ${CUSTOMER_ID}
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data_${CUSTOMER_ID}:/prometheus
    networks:
      - customer-${CUSTOMER_ID}-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=prometheus"
      - "ai-agency.tier=${CUSTOMER_TIER}"

  # Customer-Dedicated Grafana for Visualization
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana-${CUSTOMER_ID}
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      CUSTOMER_ID: ${CUSTOMER_ID}
      GF_SECURITY_ADMIN_PASSWORD: ${SECURE_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel,grafana-worldmap-panel"
      GF_LOG_LEVEL: info
      GF_METRICS_ENABLED: "true"
    volumes:
      - grafana_data_${CUSTOMER_ID}:/var/lib/grafana
      - ./config/monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./config/monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./config/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/customer-dashboards:ro
    networks:
      - customer-${CUSTOMER_ID}-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=grafana"
      - "ai-agency.tier=${CUSTOMER_TIER}"

  # Customer-Dedicated Jaeger for Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: jaeger-${CUSTOMER_ID}
    ports:
      - "${JAEGER_UI_PORT}:16686"
      - "${JAEGER_COLLECTOR_PORT}:14268"
    environment:
      CUSTOMER_ID: ${CUSTOMER_ID}
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory
      MEMORY_MAX_TRACES: "100000"
      QUERY_UI_CONFIG: /etc/jaeger/ui-config.json
    volumes:
      - ./config/monitoring/jaeger/ui-config.json:/etc/jaeger/ui-config.json:ro
    networks:
      - customer-${CUSTOMER_ID}-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=jaeger"
      - "ai-agency.tier=${CUSTOMER_TIER}"

  # Customer-Dedicated Nginx Reverse Proxy with Security Headers
  nginx-proxy:
    image: nginx:1.25-alpine
    container_name: nginx-proxy-${CUSTOMER_ID}
    ports:
      - "${NGINX_PORT}:80"
      - "${NGINX_SSL_PORT}:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx/${CUSTOMER_ID}:/var/log/nginx
    networks:
      - customer-${CUSTOMER_ID}-network
    depends_on:
      - mcp-server
      - prometheus
      - grafana
      - jaeger
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=nginx-proxy"
      - "ai-agency.tier=${CUSTOMER_TIER}"

  # Customer-Dedicated Log Aggregation Service
  loki:
    image: grafana/loki:2.9.0
    container_name: loki-${CUSTOMER_ID}
    ports:
      - "${LOKI_PORT}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data_${CUSTOMER_ID}:/loki
      - ./config/monitoring/loki.yml:/etc/loki/local-config.yaml:ro
    networks:
      - customer-${CUSTOMER_ID}-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=loki"
      - "ai-agency.tier=${CUSTOMER_TIER}"

  # Customer-Dedicated Fluent Bit for Log Shipping
  fluent-bit:
    image: fluent/fluent-bit:2.2.0
    container_name: fluent-bit-${CUSTOMER_ID}
    volumes:
      - ./config/monitoring/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./logs:/var/log/containers:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - customer-${CUSTOMER_ID}-network
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2020/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
    restart: unless-stopped
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.service=fluent-bit"
      - "ai-agency.tier=${CUSTOMER_TIER}"

# Customer-Dedicated Volumes for Data Persistence
volumes:
  postgres_data_${CUSTOMER_ID}:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./customer-volumes/${CUSTOMER_ID}/postgres
  redis_data_${CUSTOMER_ID}:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./customer-volumes/${CUSTOMER_ID}/redis
  qdrant_data_${CUSTOMER_ID}:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./customer-volumes/${CUSTOMER_ID}/qdrant
  neo4j_data_${CUSTOMER_ID}:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./customer-volumes/${CUSTOMER_ID}/neo4j/data
  neo4j_logs_${CUSTOMER_ID}:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./customer-volumes/${CUSTOMER_ID}/neo4j/logs
  neo4j_import_${CUSTOMER_ID}:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./customer-volumes/${CUSTOMER_ID}/neo4j/import
  prometheus_data_${CUSTOMER_ID}:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./customer-volumes/${CUSTOMER_ID}/prometheus
  grafana_data_${CUSTOMER_ID}:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./customer-volumes/${CUSTOMER_ID}/grafana
  loki_data_${CUSTOMER_ID}:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./customer-volumes/${CUSTOMER_ID}/loki

# Customer-Dedicated Network for Complete Isolation
networks:
  customer-${CUSTOMER_ID}-network:
    driver: bridge
    name: customer-${CUSTOMER_ID}-network
    ipam:
      driver: default
      config:
        - subnet: 172.${CUSTOMER_SUBNET}.0.0/16
    labels:
      - "ai-agency.customer-id=${CUSTOMER_ID}"
      - "ai-agency.isolation=per-customer"

# Production Configuration Notes:
#
# 1. Per-Customer Isolation:
#    - Dedicated containers for each customer with unique naming
#    - Isolated networks preventing cross-customer communication  
#    - Separate databases and data volumes per customer
#    - Customer-specific ports to avoid conflicts
#
# 2. Resource Management:
#    - Tier-based resource limits (CPU, memory, storage)
#    - Resource reservations to guarantee minimum resources
#    - Auto-scaling support through Docker Swarm or Kubernetes
#    - Resource monitoring and alerting per customer
#
# 3. Security & Compliance:
#    - Customer data isolation at all levels
#    - Encrypted connections between services
#    - Audit logging for compliance (GDPR, SOC2)
#    - Customer-specific security policies
#
# 4. Production Monitoring:
#    - Health checks for all services
#    - Prometheus metrics collection per customer
#    - Structured logging with customer ID tagging
#    - SLA monitoring and alerting
#
# 5. Backup & Recovery:
#    - Customer data backup to isolated storage
#    - Point-in-time recovery capabilities
#    - Disaster recovery procedures per customer
#    - Data export for customer portability
#
# 6. Deployment Process:
#    - Automated provisioning via Customer Provisioning Orchestrator
#    - Zero-downtime updates using blue-green deployments
#    - Rollback capabilities on deployment failures  
#    - Customer-specific configuration management
#
# 7. Scaling Strategy:
#    - Horizontal scaling: Add more customer instances
#    - Vertical scaling: Upgrade customer tier resources
#    - Auto-scaling based on customer usage patterns
#    - Cost optimization through resource right-sizing