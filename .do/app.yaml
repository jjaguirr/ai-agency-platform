# DigitalOcean App Platform Configuration
# Personal EA Webhook Service for Phase 2 EA Orchestration
name: ai-agency-platform-webhook
services:
  - name: webhook-api
    source_dir: /
    github:
      repo: jjaguirr/ai-agency-platform
      branch: phase-2-development
    run_command: gunicorn --bind 0.0.0.0:$PORT --timeout 120 --workers 2 src.webhook.unified_whatsapp_webhook:app
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    
    # Health check
    health_check:
      http_path: /health
      
    # Environment variables
    envs:
      - key: FLASK_ENV
        value: production
      - key: PYTHONPATH
        value: /workspace
      - key: WHATSAPP_VERIFY_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: WHATSAPP_BUSINESS_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: WHATSAPP_BUSINESS_PHONE_ID
        scope: RUN_TIME
        type: SECRET
      - key: WHATSAPP_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ELEVENLABS_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: EA_INTEGRATION_ENABLED
        value: "true"
      - key: ENVIRONMENT
        value: "production"
      - key: LOG_LEVEL
        value: "INFO"

# Domain configuration for custom webhook URL
domains:
  - domain: webhook.aiagency.platform
    type: PRIMARY
    
# Database would be separate DigitalOcean Managed Database
# Redis would be separate DigitalOcean Managed Redis

