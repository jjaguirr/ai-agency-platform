# Docker Compose for Security API Stack (Bypass Mode)
# Real Llama Guard 4 disabled for development - API returns 'safe' for all content
# Usage: docker-compose -f docker-compose.security-api.yml --env-file .env.security up -d

services:
  # Security API - MCPhub Integration (Bypass Mode)
  security-api:
    build:
      context: ./src/security
      dockerfile: Dockerfile.llamaguard-api
    container_name: security-api
    ports:
      - "8083:8080"  # Security API endpoint
    environment:
      - LLAMAGUARD_ENABLED=false  # BYPASS MODE for development
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis-security:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      redis-security:
        condition: service_healthy
    volumes:
      - ./config/security/safety-policies.yaml:/app/config/safety-policies.yaml:ro
      - ./logs/security:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ai-agency-security

  # Security Proxy - Rate Limiting and Basic Protection
  security-proxy:
    image: nginx:1.25-alpine
    container_name: security-proxy
    ports:
      - "8080:80"   # Main entry point for all LLM traffic
      - "8443:443"  # HTTPS endpoint
    volumes:
      - ./config/nginx/security-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - security-api
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ai-agency-security

  # Redis for Security Caching and Rate Limiting
  redis-security:
    image: redis:7-alpine
    container_name: redis-security
    ports:
      - "6380:6379"  # Separate Redis for security services
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_security_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - ai-agency-security

# Security Event Logger removed for simplified development deployment

volumes:
  redis_security_data:
    driver: local

networks:
  ai-agency-security:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
    labels:
      - "ai.agency.network=security"
      - "ai.agency.environment=production"

# Security Configuration Notes:
# 
# 1. Llama Guard 4 Service:
#    - Uses HuggingFace TGI for optimal performance
#    - Configured for GPU acceleration (requires NVIDIA GPU)
#    - Quantized for memory efficiency
#    - Health checks ensure service reliability
#
# 2. API Wrapper:
#    - Provides REST API for MCPhub integration
#    - Handles input/output filtering logic
#    - Implements safety policy enforcement
#    - Includes comprehensive logging and monitoring
#
# 3. Security Proxy:
#    - Nginx-based rate limiting and DDoS protection
#    - SSL/TLS termination
#    - Request routing and load balancing
#    - Security headers injection
#
# 4. Deployment Requirements:
#    - NVIDIA GPU for optimal Llama Guard performance
#    - Minimum 8GB GPU memory for full model
#    - 16GB+ system RAM recommended
#    - SSD storage for model caching
#
# 5. Environment Variables Required:
#    - HUGGING_FACE_HUB_TOKEN: For model downloads
#    - POSTGRES_PASSWORD: Database connection
#    - SSL certificates in config/nginx/ssl/
#
# 6. Integration Points:
#    - Port 8080: Main entry point for all LLM traffic
#    - Port 8083: Direct API access for testing
#    - Redis integration for caching and rate limiting
#    - PostgreSQL integration for audit logging
#
# 7. Security Features:
#    - Input filtering (prompt injection detection)
#    - Output filtering (response safety checking)
#    - Rate limiting per customer tier
#    - Comprehensive audit logging
#    - Real-time monitoring and alerting