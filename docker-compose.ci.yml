# AI Agency Platform - CI/CD Optimized Configuration
# Lightweight services for GitHub Actions testing environment
# Optimized for speed, reliability, and resource efficiency

services:
  # Core Database - PostgreSQL (Lightweight for CI)
  postgres:
    image: postgres:15-alpine
    container_name: ai-agency-postgres-ci
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      # Optimize for CI performance
      POSTGRES_INITDB_ARGS: "--data-checksums --encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    # No persistent volumes for CI - use tmpfs for speed
    tmpfs:
      - /var/lib/postgresql/data:rw,noexec,nosuid,size=512m
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c min_wal_size=1GB
        -c max_wal_size=4GB
        -c max_worker_processes=8
        -c max_parallel_workers_per_gather=4
        -c max_parallel_workers=8
        -c max_parallel_maintenance_workers=4
        -c fsync=off
        -c synchronous_commit=off
        -c full_page_writes=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: "no"
    networks:
      - ci-network

  # Cache & Session Store - Redis (Lightweight for CI)
  redis:
    image: redis:7-alpine
    container_name: ai-agency-redis-ci
    ports:
      - "6379:6379"
    # No persistent volumes for CI - use tmpfs
    tmpfs:
      - /data:rw,noexec,nosuid,size=256m
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly no
        --save ""
        --tcp-keepalive 60
        --timeout 300
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s
    restart: "no"
    networks:
      - ci-network

  # Vector Database for Testing - Qdrant (Minimal for CI)
  qdrant:
    image: qdrant/qdrant:v1.7.3
    container_name: ai-agency-qdrant-ci
    ports:
      - "6333:6333"
      - "6334:6334"
    # No persistent volumes for CI - use tmpfs
    tmpfs:
      - /qdrant/storage:rw,noexec,nosuid,size=256m
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=WARN
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=2
      - QDRANT__STORAGE__PERFORMANCE__MAX_OPTIMIZATION_THREADS=1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    restart: "no"
    networks:
      - ci-network

  # Memory Infrastructure Monitor (Minimal for CI)
  memory-monitor:
    build:
      context: ./src/memory
      dockerfile: Dockerfile.monitor
    container_name: ai-agency-memory-monitor-ci
    ports:
      - "8084:8080"
    environment:
      - POSTGRES_URL=postgresql://testuser:testpass@postgres:5432/testdb
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URL=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j_ci_pass
      - MONITORING_INTERVAL=60
      - SLA_ENFORCEMENT=false
      - LOG_LEVEL=WARN
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # No persistent volumes for CI
    tmpfs:
      - /app/logs:rw,noexec,nosuid,size=64m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    restart: "no"
    networks:
      - ci-network

  # Security API - CI Mode (Minimal Security Checks)
  security-api:
    build:
      context: ./src/security
      dockerfile: Dockerfile.llamaguard-api
    container_name: ai-agency-security-api-ci
    ports:
      - "8083:8080"
    environment:
      - LLAMAGUARD_ENABLED=false  # Bypass for CI speed
      - LOG_LEVEL=WARN
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://testuser:testpass@postgres:5432/testdb
      - JWT_SECRET=ci-test-secret-key-not-for-production
      - CI_MODE=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No persistent volumes for CI
    tmpfs:
      - /app/logs:rw,noexec,nosuid,size=32m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    restart: "no"
    networks:
      - ci-network

# No volumes for CI - everything is ephemeral for speed
networks:
  ci-network:
    driver: bridge
    name: ai-agency-ci-network

# CI Configuration Notes:
#
# 1. Performance Optimizations:
#    - All services use tmpfs for maximum I/O speed
#    - PostgreSQL optimized with CI-friendly settings (fsync=off, etc.)
#    - Redis configured for maximum performance (appendonly=off)
#    - Qdrant with minimal threads and logging
#
# 2. Resource Limits:
#    - PostgreSQL: 512MB storage + 256MB shared buffers
#    - Redis: 256MB memory limit
#    - Qdrant: 256MB storage + minimal threads
#    - All services: Reduced logging and monitoring overhead
#
# 3. Service Dependencies:
#    - Clear dependency chain: postgres -> redis -> qdrant -> apps
#    - Fast health checks with appropriate timeouts
#    - No persistent storage for CI speed
#
# 4. CI-Specific Features:
#    - restart: "no" for all services (fail fast in CI)
#    - Reduced health check intervals for faster startup
#    - Minimal logging to reduce resource usage
#    - Security bypass modes for testing speed
#
# 5. Service Endpoints (CI):
#    - PostgreSQL: localhost:5432 (testuser/testpass/testdb)
#    - Redis: localhost:6379 (no auth)
#    - Qdrant: localhost:6333 (HTTP), localhost:6334 (gRPC)
#    - Memory Monitor: localhost:8084
#    - Security API: localhost:8083
#
# 6. Excluded Services (for CI speed):
#    - Neo4j: Too resource-intensive, not required for basic CI tests
#    - LangFuse: Observability not needed in CI
#    - MinIO: Object storage not needed for basic tests
#    - Security Proxy: Direct API access in CI
#
# 7. Database Initialization:
#    - Uses simplified schema for testing
#    - testdb database with testuser credentials
#    - No multi-database setup needed for CI
#
# 8. Startup Time Target: <60 seconds for all services
#    - Optimized health check timings
#    - Minimal service startup dependencies
#    - Fast-fail configuration for debugging