# Lightweight Docker Compose for CI Testing
# Only essential services with minimal overhead and proper startup ordering

services:
  # Core Database - PostgreSQL (starts first)
  postgres:
    image: postgres:15-alpine
    container_name: ci-postgres
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # Cache Store - Redis (starts after postgres is healthy)
  redis:
    image: redis:7-alpine
    container_name: ci-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # Vector Database - Qdrant (starts after redis is healthy)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ci-qdrant
    ports:
      - "6333:6333"
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

# Note: Skipping heavy services for CI (langfuse, minio, security-api, etc.)
# These can be tested in staging/integration environments