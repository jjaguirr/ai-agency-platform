name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Start Docker services
        timeout-minutes: 8
        run: |
          echo "Starting Docker services (using optimized CI config)..."
          docker compose -f docker-compose.ci.yml up -d
          
          echo "Container status after startup:"
          docker compose -f docker-compose.ci.yml ps
          
          # Use Docker's built-in health checks - more reliable than manual polling
          echo "Waiting for services to become healthy (using Docker health checks)..."
          
          # Wait for health checks to pass (Docker Compose will show services as healthy)
          timeout 300 bash -c '
            while true; do
              POSTGRES_HEALTH=$(docker inspect --format="{{.State.Health.Status}}" ai-agency-postgres-ci 2>/dev/null || echo "starting")
              REDIS_HEALTH=$(docker inspect --format="{{.State.Health.Status}}" ai-agency-redis-ci 2>/dev/null || echo "starting")
              
              echo "Health Status - Postgres: $POSTGRES_HEALTH, Redis: $REDIS_HEALTH"
              
              if [[ "$POSTGRES_HEALTH" == "healthy" && "$REDIS_HEALTH" == "healthy" ]]; then
                echo "✅ All services are healthy!"
                break
              fi
              
              sleep 10
            done
          '
          
          echo "Final container status:"
          docker compose -f docker-compose.ci.yml ps
          
      - name: Verify service connectivity
        id: health
        run: |
          echo "Verifying final service connectivity..."
          
          # Quick connectivity verification (services already passed health checks)
          echo "Testing PostgreSQL connection..."
          docker compose -f docker-compose.ci.yml exec -T postgres psql -U testuser -d testdb -c "SELECT 1;" > /dev/null
          
          echo "Testing Redis connection..."
          docker compose -f docker-compose.ci.yml exec -T redis redis-cli ping > /dev/null
          
          echo "Qdrant removed for faster CI startup" 
          
          echo "✅ All services are connected and responding!"
      
      - name: Test EA Basic Conversation
        run: |
          echo "Testing Executive Assistant core conversation flow..."
          python3 -m pip install --quiet redis qdrant-client openai langchain-core langgraph psycopg2-binary requests
          python3 test_ea_basic.py
          echo "✅ EA basic test complete"
      
      - name: Run basic tests
        run: |
          echo "Running basic validation tests..."
          
          # Check if EA Python script exists and is valid
          if [ -f "src/agents/executive-assistant.py" ]; then
            python3 -m py_compile src/agents/executive-assistant.py
            echo "✅ EA script is valid Python"
          else
            echo "⚠️ EA script not found (expected for early development)"
          fi
          
          # Check if database schema exists
          if [ -f "src/database/schema.sql" ]; then
            echo "✅ Database schema found"
          else
            echo "❌ Database schema missing"
            exit 1
          fi
          
          # Check critical configuration files
          if [ -f "docker-compose.yml" ]; then
            echo "✅ Docker Compose configuration valid"
          else
            echo "❌ Docker Compose configuration missing"
            exit 1
          fi
      
      - name: Security check
        continue-on-error: true
        run: |
          echo "Running basic security checks..."
          
          # Check for exposed secrets
          if grep -r "password\|secret\|api_key" --include="*.yml" --include="*.yaml" --include="*.json" --exclude-dir=node_modules . | grep -v "#\|//"; then
            echo "⚠️ Potential secrets found in config files - please review"
          else
            echo "✅ No obvious secrets in config files"
          fi
      
      - name: Generate status summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ CI Status: PASSING" >> $GITHUB_STEP_SUMMARY
            echo "All checks completed successfully. Ready for PR!" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ CI Status: FAILING" >> $GITHUB_STEP_SUMMARY
            echo "Please fix the issues above before creating a PR." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services Status" >> $GITHUB_STEP_SUMMARY
          echo "- PostgreSQL: Checked" >> $GITHUB_STEP_SUMMARY
          echo "- Redis: Checked" >> $GITHUB_STEP_SUMMARY
          echo "- Qdrant: Checked" >> $GITHUB_STEP_SUMMARY
          echo "- Voice CI Test Runner: Checked" >> $GITHUB_STEP_SUMMARY
          echo "- Voice API Mock: Checked" >> $GITHUB_STEP_SUMMARY
      
      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml down -v