name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Start Docker services
        run: |
          docker compose -f docker-compose.ci.yml up -d
          echo "Waiting for PostgreSQL..."
          timeout 60 bash -c 'until docker compose -f docker-compose.ci.yml exec -T postgres pg_isready -U testuser -d testdb; do sleep 2; done'
          echo "Waiting for Redis..."
          timeout 30 bash -c 'until docker compose -f docker-compose.ci.yml exec -T redis redis-cli ping | grep -q PONG; do sleep 2; done'
          echo "Waiting for Qdrant..."
          timeout 60 bash -c 'until curl -sf http://localhost:6333/readyz > /dev/null; do sleep 2; done'
          echo "All services ready."

      - name: Run unit tests
        run: uv run pytest tests/unit/ --tb=short -q

      - name: Security check
        continue-on-error: true
        run: |
          echo "Scanning config files for potential secrets..."
          if grep -r "password\|secret\|api_key" --include="*.yml" --include="*.yaml" --include="*.json" --exclude-dir=node_modules --exclude-dir=.venv . | grep -v "#\|//"; then
            echo "::warning::Potential secrets found in config files - please review"
          else
            echo "No obvious secrets in config files"
          fi

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
