# Production Deployment Configuration
# AI Agency Platform - Production Environment Settings

# Environment Configuration
environment:
  name: production
  region: us-east-1
  availability_zones: [us-east-1a, us-east-1b, us-east-1c]
  
# Deployment Strategy
deployment:
  strategy: blue-green  # blue-green, rolling, canary
  timeout_seconds: 600
  health_check_timeout: 300
  rollback_enabled: true
  auto_rollback_on_failure: true
  
# Customer Provisioning Configuration
customer_provisioning:
  target_provisioning_time_seconds: 30
  max_concurrent_provisioning: 20
  customer_isolation: complete
  auto_scaling_enabled: true
  
# Resource Configuration
resources:
  # Orchestrator Service
  orchestrator:
    replicas: 5
    cpu_request: "1000m"
    cpu_limit: "2000m"
    memory_request: "2Gi"
    memory_limit: "4Gi"
    storage: "100Gi"
    
  # Performance Monitor  
  performance_monitor:
    replicas: 3
    cpu_request: "500m"
    cpu_limit: "1000m"
    memory_request: "1Gi"
    memory_limit: "2Gi"
    
  # Customer Proxy
  customer_proxy:
    replicas: 10
    cpu_request: "200m"
    cpu_limit: "1000m"
    memory_request: "512Mi"
    memory_limit: "2Gi"
    
  # Per-Customer Services (Template)
  customer_services:
    mcp_server:
      cpu_limit: "1000m"
      memory_limit: "2Gi"
      storage_limit: "50Gi"
      
    postgres:
      cpu_limit: "500m" 
      memory_limit: "1Gi"
      storage_limit: "100Gi"
      
    redis:
      cpu_limit: "200m"
      memory_limit: "512Mi"
      storage_limit: "10Gi"

# Security Configuration
security:
  network_isolation: enabled
  encryption_at_rest: enabled
  encryption_in_transit: enabled
  secret_management: hashicorp_vault
  compliance_standards:
    - gdpr
    - soc2
    - hipaa
  audit_logging: enabled
  vulnerability_scanning: daily
  
# Monitoring and Observability
monitoring:
  prometheus:
    enabled: true
    retention_days: 90
    scrape_interval: 15s
    
  grafana:
    enabled: true
    admin_user: admin
    dashboard_auto_import: true
    
  alertmanager:
    enabled: true
    webhook_url: ${SLACK_WEBHOOK_URL}
    
  jaeger:
    enabled: true
    sampling_rate: 0.1
    
  elasticsearch:
    enabled: true
    retention_days: 30
    index_replicas: 2

# Performance SLA Configuration
sla:
  memory_recall_ms: 500
  api_response_ms: 200
  conversation_processing_ms: 2000
  customer_provisioning_seconds: 30
  cross_channel_transfer_ms: 1000
  uptime_percent: 99.9
  
# Auto-scaling Configuration
autoscaling:
  orchestrator:
    min_replicas: 3
    max_replicas: 20
    cpu_threshold: 70
    memory_threshold: 80
    
  performance_monitor:
    min_replicas: 2
    max_replicas: 10
    cpu_threshold: 75
    
  customer_proxy:
    min_replicas: 5
    max_replicas: 50
    cpu_threshold: 60

# Load Balancing
load_balancing:
  type: nlb  # Network Load Balancer
  ssl_policy: ELBSecurityPolicy-TLS-1-2-2017-01
  health_check:
    path: /health
    interval_seconds: 30
    timeout_seconds: 5
    healthy_threshold: 2
    unhealthy_threshold: 3

# Storage Configuration
storage:
  customer_data:
    type: high-performance-ssd
    size: 10Ti
    backup_enabled: true
    encryption: enabled
    
  monitoring_data:
    type: standard-ssd
    size: 5Ti
    retention_days: 90
    
  logs:
    type: standard
    size: 2Ti
    retention_days: 30

# Backup and Disaster Recovery
backup:
  frequency: hourly
  retention_policy:
    hourly: 24_hours
    daily: 30_days
    weekly: 12_weeks
    monthly: 12_months
  cross_region_replication: true
  encryption: enabled
  
disaster_recovery:
  rto_minutes: 15  # Recovery Time Objective
  rpo_minutes: 60  # Recovery Point Objective
  backup_regions: [us-west-2, eu-west-1]
  automated_failover: true

# Cost Optimization
cost_optimization:
  spot_instances: false  # Production should use on-demand
  reserved_instances: true
  resource_right_sizing: enabled
  unused_resource_cleanup: enabled
  
# Development and Testing
testing:
  smoke_tests_enabled: true
  performance_tests_enabled: true
  security_tests_enabled: true
  integration_tests_enabled: true
  
# CI/CD Pipeline Configuration
cicd:
  build_timeout: 1800  # 30 minutes
  test_timeout: 3600   # 60 minutes
  deployment_timeout: 1800  # 30 minutes
  parallel_builds: 5
  artifact_retention_days: 30
  
# External Dependencies
external_dependencies:
  openai:
    api_endpoint: https://api.openai.com/v1
    rate_limit_rpm: 100000
    timeout_seconds: 30
    
  anthropic:
    api_endpoint: https://api.anthropic.com
    rate_limit_rpm: 50000
    timeout_seconds: 30
    
  notification_services:
    slack:
      webhook_enabled: true
      channel: "#production-alerts"
    email:
      smtp_enabled: true
      recipients: ["ops@ai-agency-platform.com"]

# Feature Flags
feature_flags:
  customer_provisioning_v2: true
  enhanced_monitoring: true
  advanced_security: true
  performance_optimization: true
  
# Compliance and Governance
compliance:
  data_residency: us
  audit_requirements:
    - access_logging
    - change_tracking
    - security_events
  retention_policies:
    customer_data: 7_years
    audit_logs: 10_years
    performance_data: 2_years