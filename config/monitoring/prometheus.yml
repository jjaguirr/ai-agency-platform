global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 5s

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 5s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 10s

  # TODO: Configure Mem0 monitoring when implemented
  # - job_name: 'mem0'
  #   metrics_path: '/metrics'
  #   static_configs:
  #     - targets: ['mem0:8080']
  #   scrape_interval: 10s

  - job_name: 'dual-agent-health'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8080'] # Custom metrics endpoint we'll create
    scrape_interval: 10s