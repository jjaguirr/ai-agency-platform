# AI Agency Platform - Customer Security Policies
# Per-customer security configuration and access controls

# Customer Isolation Policies
isolation:
  enforce_customer_boundaries: true
  customer_data_separation: strict
  cross_customer_access: deny
  audit_all_operations: true

# Authentication & Authorization
authentication:
  require_customer_api_key: true
  session_timeout_minutes: 60
  multi_factor_required: false
  password_policy:
    min_length: 12
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_symbols: true

# Rate Limiting (per customer)
rate_limiting:
  api_requests_per_minute: 1000
  concurrent_connections: 20
  memory_operations_per_hour: 5000
  bulk_operations_per_day: 100

# Data Protection
data_protection:
  encryption_at_rest: true
  encryption_in_transit: true
  data_classification: confidential
  retention_policy_days: 90
  gdpr_compliance: true
  data_export_allowed: true
  right_to_forget: true

# Content Security
content_security:
  input_validation: strict
  output_sanitization: true
  content_filtering: enabled
  malware_scanning: true
  pii_detection: true
  llamaguard_enabled: true

# Network Security
network_security:
  customer_network_isolation: true
  allowed_ip_ranges: []
  blocked_ip_ranges: []
  firewall_rules: default_deny
  vpc_isolation: true

# Monitoring & Alerting
monitoring:
  security_event_logging: true
  anomaly_detection: true
  failed_login_threshold: 5
  suspicious_activity_alerts: true
  compliance_reporting: true

# Business Logic Security
business_logic:
  customer_data_queries:
    - allow: "customer_id = current_customer"
    - deny: "customer_id != current_customer"
  memory_operations:
    - allow: "same_customer_memory_space"
    - deny: "cross_customer_memory_access"
  file_operations:
    - allow: "customer_directory_only"
    - deny: "system_directory_access"

# Incident Response
incident_response:
  auto_quarantine_threshold: high
  notification_channels:
    - email
    - slack
    - webhook
  escalation_levels:
    - low: log_only
    - medium: alert_admin
    - high: quarantine_customer
    - critical: emergency_shutdown

# Compliance Settings
compliance:
  gdpr_enabled: true
  ccpa_enabled: true
  sox_compliance: false
  pci_compliance: false
  hipaa_compliance: false
  audit_trail_retention_years: 7