# Security Checks Include File for Nginx
# Basic request validation and attack pattern blocking

# Method validation - only allow standard HTTP methods
if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
    access_log /var/log/nginx/blocked.log security;
    return 405;
}

# Block SQL injection patterns in headers
if ($http_x_forwarded_for ~* (union|select|insert|cast|set|declare|drop|update|exec|script)) {
    access_log /var/log/nginx/blocked.log security;
    return 403;
}

# Block SQL injection in query parameters
if ($query_string ~* (union|select|insert|cast|set|declare|drop|update|exec|script)) {
    access_log /var/log/nginx/blocked.log security;
    return 403;
}

# Content-Length validation
if ($http_content_length !~ ^\d*$) {
    access_log /var/log/nginx/blocked.log security;
    return 400;
}

# Block oversized requests (beyond 10MB already set globally)
if ($http_content_length ~ ^\d{8,}$) {
    access_log /var/log/nginx/blocked.log security;
    return 413;
}

# Block common XSS patterns in URI
if ($request_uri ~* (<script|javascript:|vbscript:|onload|onerror|onclick)) {
    access_log /var/log/nginx/blocked.log security;
    return 403;
}

# Block directory traversal attempts
if ($request_uri ~* (\.\.\/|\.\.\\)) {
    access_log /var/log/nginx/blocked.log security;
    return 403;
}

# Block null byte injection
if ($request_uri ~* (%00|\\x00)) {
    access_log /var/log/nginx/blocked.log security;
    return 403;
}

# Block requests with suspicious referrers
if ($http_referer ~* (baidu|semalt|uptime|pingdom|crawler|spider)) {
    access_log /var/log/nginx/blocked.log security;
    return 444;
}