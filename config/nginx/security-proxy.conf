# AI Agency Platform - Nginx Security Proxy Configuration
# Provides rate limiting, DDoS protection, and request routing for Llama Guard 4

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Configuration
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for" '
                   'rt=$request_time uct="$upstream_connect_time" '
                   'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format security '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for" '
                       'customer_id="$http_x_customer_id" security_tier="$http_x_security_tier" '
                       'blocked="$http_x_blocked" violation="$http_x_violation"';

    access_log /var/log/nginx/access.log main;
    access_log /var/log/nginx/security.log security;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;
    server_tokens off;

    # Rate Limiting Zones
    # Basic tier: 100 req/min per IP
    limit_req_zone $binary_remote_addr zone=basic_tier:10m rate=100r/m;
    
    # Professional tier: 500 req/min per customer
    limit_req_zone $http_x_customer_id zone=professional_tier:10m rate=500r/m;
    
    # Enterprise tier: 2000 req/min per customer  
    limit_req_zone $http_x_customer_id zone=enterprise_tier:10m rate=2000r/m;
    
    # Global DDoS protection: 1000 req/min per IP
    limit_req_zone $binary_remote_addr zone=ddos_protection:10m rate=1000r/m;
    
    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    
    # Security Headers Map
    map $sent_http_content_type $security_headers_csp {
        ~*text/(html|javascript)|application/javascript "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; object-src 'none';";
    }

    # Customer Tier Detection
    map $http_x_security_tier $rate_limit_zone {
        "basic"        "basic_tier";
        "professional" "professional_tier"; 
        "enterprise"   "enterprise_tier";
        default        "basic_tier";
    }

    # Upstream Services
    upstream llamaguard_api {
        server llamaguard-api:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream mcphub_backend {
        server mcphub-server:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Security Middleware Server Block
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        
        # Basic Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $security_headers_csp always;
        add_header X-Security-Proxy "AI-Agency-Platform" always;

        # Apply rate limiting based on customer tier
        limit_req zone=ddos_protection burst=50 nodelay;
        limit_conn conn_limit_per_ip 20;

        # Basic tier rate limiting (default)
        location / {
            limit_req zone=basic_tier burst=20 nodelay;
            
            # Security checks before proxying
            include /etc/nginx/security_checks.conf;
            
            # Proxy to Llama Guard for safety evaluation
            location ~* ^/api/v1/(chat|completion|generate) {
                # Apply customer tier specific rate limiting
                if ($http_x_security_tier = "professional") {
                    limit_req zone=professional_tier burst=100 nodelay;
                }
                if ($http_x_security_tier = "enterprise") {
                    limit_req zone=enterprise_tier burst=500 nodelay;
                }
                
                # Add security headers for Llama Guard
                proxy_set_header X-Customer-ID $http_x_customer_id;
                proxy_set_header X-Security-Tier $http_x_security_tier;
                proxy_set_header X-Request-Type "input";
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $http_host;
                
                # First evaluate with Llama Guard
                auth_request /auth-llamaguard;
                
                # If safe, proxy to MCPhub
                proxy_pass http://mcphub_backend;
                proxy_timeout 30s;
                proxy_connect_timeout 5s;
                
                # Handle response filtering
                header_filter_by_lua_block {
                    -- Add response filtering hook
                    ngx.header["X-Content-Filtered"] = "true"
                }
            }
            
            # Direct API access for testing
            location /security/evaluate {
                limit_req zone=basic_tier burst=50 nodelay;
                
                proxy_pass http://llamaguard_api/evaluate;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Host $http_host;
            }
            
            # Health check endpoint
            location /health {
                access_log off;
                add_header Content-Type application/json;
                return 200 '{"status":"healthy","service":"ai-agency-security-proxy","timestamp":"$time_iso8601"}';
            }
            
            # Security statistics
            location /security/stats {
                limit_req zone=basic_tier burst=10 nodelay;
                
                proxy_pass http://llamaguard_api/stats;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
        }
        
        # Internal auth endpoint for Llama Guard evaluation
        location = /auth-llamaguard {
            internal;
            proxy_pass http://llamaguard_api/evaluate;
            proxy_pass_request_body on;
            proxy_set_header Content-Length $http_content_length;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Customer-ID $http_x_customer_id;
            proxy_set_header X-Security-Tier $http_x_security_tier;
            proxy_set_header X-Request-Type "input";
        }

        # Block common attack patterns
        location ~* /(wp-admin|wp-login|phpMyAdmin|admin|administrator) {
            access_log /var/log/nginx/blocked.log security;
            return 444;
        }
        
        # Block suspicious user agents
        if ($http_user_agent ~* (curl|wget|python|bot|crawler|spider)) {
            access_log /var/log/nginx/blocked.log security;
            return 444;
        }
        
        # Block requests with no user agent
        if ($http_user_agent = "") {
            access_log /var/log/nginx/blocked.log security;
            return 444;
        }
        
        # Error pages
        error_page 429 /429.html;
        location = /429.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # HTTPS Server Block (Production)
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;
        
        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        
        # Security Headers for HTTPS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Same location blocks as HTTP server
        include /etc/nginx/conf.d/security_locations.conf;
    }
}

