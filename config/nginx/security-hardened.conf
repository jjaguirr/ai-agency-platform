# AI Agency Platform - Production Hardened Nginx Security Configuration
# Addresses P0 security vulnerabilities with enterprise-grade hardening

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Security: Limit worker connections and optimize
events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Security Headers - Comprehensive Protection
    map $sent_http_content_type $security_headers_csp {
        default "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';";
        ~*text/html "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';";
        application/json "default-src 'none';";
    }

    # Logging Configuration - Enhanced Security Logging
    log_format security_enhanced '$remote_addr - $remote_user [$time_local] "$request" '
                                '$status $body_bytes_sent "$http_referer" '
                                '"$http_user_agent" "$http_x_forwarded_for" '
                                'customer_id="$jwt_customer_id" security_tier="$jwt_security_tier" '
                                'blocked="$security_blocked" violation="$security_violation" '
                                'auth_status="$auth_status" rate_limited="$rate_limited" '
                                'request_id="$request_id" response_time="$request_time"';

    access_log /var/log/nginx/access.log security_enhanced;
    error_log /var/log/nginx/error.log warn;

    # Basic Security Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;  # Reduced from 65 for security
    types_hash_max_size 2048;
    client_max_body_size 1M;  # Reduced from 10M for security
    server_tokens off;
    
    # Security: Hide nginx version
    more_set_headers "Server: AI-Agency-Security-Gateway";

    # Security: Request size limits
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;
    client_body_timeout 30;
    client_header_timeout 30;
    send_timeout 30;

    # Rate Limiting Zones - Tier-Based with Burst Protection
    # Basic tier: 50 req/min per IP (reduced from 100)
    limit_req_zone $binary_remote_addr zone=basic_tier:10m rate=50r/m;
    
    # Professional tier: 200 req/min per customer (reduced from 500)
    limit_req_zone $jwt_customer_id zone=professional_tier:10m rate=200r/m;
    
    # Enterprise tier: 1000 req/min per customer (reduced from 2000)
    limit_req_zone $jwt_customer_id zone=enterprise_tier:10m rate=1000r/m;
    
    # Global DDoS protection: 100 req/min per IP (reduced from 1000)
    limit_req_zone $binary_remote_addr zone=ddos_protection:10m rate=100r/m;
    
    # Connection limiting - Stricter limits
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    limit_conn_zone $jwt_customer_id zone=conn_limit_per_customer:10m;
    
    # JWT Token Validation Map
    map $http_authorization $jwt_token {
        ~^Bearer\s+(.+)$ $1;
        default "";
    }

    # JWT Customer ID extraction (requires lua module or external validation)
    map $jwt_token $jwt_customer_id {
        default "anonymous";
        # This would be populated by JWT validation lua script
    }

    map $jwt_token $jwt_security_tier {
        default "basic";
        # This would be populated by JWT validation lua script
    }

    # Security blocking flags
    map $request_uri $security_blocked {
        default "false";
        ~*(union|select|insert|drop|delete|script|javascript|vbscript) "true";
        ~*(\.\./|\.\.\\|etc/passwd|/proc/) "true";
    }

    # Geographic blocking (optional)
    # geo $blocked_country {
    #     default 0;
    #     # CN 1;  # Block China
    #     # RU 1;  # Block Russia
    # }

    # Upstream Services with Health Checks
    upstream llamaguard_api_cluster {
        least_conn;
        server llamaguard-api-1:8080 max_fails=3 fail_timeout=30s weight=1;
        server llamaguard-api-2:8080 max_fails=3 fail_timeout=30s weight=1;
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }
    
    upstream mcphub_cluster {
        least_conn;
        server mcphub-1:3000 max_fails=3 fail_timeout=30s weight=1;
        server mcphub-2:3000 max_fails=3 fail_timeout=30s weight=1;
        server mcphub-3:3000 max_fails=3 fail_timeout=30s weight=1;
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # Security Middleware Server Block
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        
        # Security: Generate unique request ID
        set $request_id $request_id;
        
        # Security: Block based on geographic location
        # if ($blocked_country) {
        #     return 403 "Access denied from your location";
        # }

        # Security: Block malicious requests immediately
        if ($security_blocked = "true") {
            access_log /var/log/nginx/blocked.log security_enhanced;
            return 403 "Request blocked by security policy";
        }

        # Comprehensive Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $security_headers_csp always;
        add_header X-Security-Gateway "AI-Agency-Platform-v1.0" always;
        add_header X-Request-ID $request_id always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Security: Remove sensitive headers
        more_clear_headers "X-Powered-By";
        more_clear_headers "X-AspNet-Version";
        more_clear_headers "X-AspNetMvc-Version";

        # Apply global rate limiting and connection limits
        limit_req zone=ddos_protection burst=20 nodelay;
        limit_conn conn_limit_per_ip 10;  # Reduced from 20

        # JWT Authentication Validation (using auth_request)
        location = /auth-jwt {
            internal;
            proxy_pass http://mcphub_cluster/api/v1/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Remote-Addr $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # Main API Routes - Authenticated
        location /api/v1/ {
            # Require JWT authentication for all API calls
            auth_request /auth-jwt;
            
            # Extract customer context from auth response
            auth_request_set $auth_customer_id $upstream_http_x_customer_id;
            auth_request_set $auth_security_tier $upstream_http_x_security_tier;
            auth_request_set $auth_status $upstream_status;
            
            # Customer isolation validation
            if ($auth_customer_id != $arg_customer_id) {
                return 403 "Customer isolation violation";
            }

            # Apply tier-based rate limiting
            set $rate_zone "basic_tier";
            if ($auth_security_tier = "professional") {
                set $rate_zone "professional_tier";
            }
            if ($auth_security_tier = "enterprise") {
                set $rate_zone "enterprise_tier";
            }

            # Customer connection limiting
            limit_conn conn_limit_per_customer 50;

            # Security filtering for chat/completion endpoints
            location ~* ^/api/v1/(chat|completion|generate) {
                # Apply tier-specific rate limiting
                if ($auth_security_tier = "basic") {
                    limit_req zone=basic_tier burst=10 nodelay;
                }
                if ($auth_security_tier = "professional") {
                    limit_req zone=professional_tier burst=50 nodelay;
                }
                if ($auth_security_tier = "enterprise") {
                    limit_req zone=enterprise_tier burst=200 nodelay;
                }
                
                # Security headers for Llama Guard
                proxy_set_header X-Customer-ID $auth_customer_id;
                proxy_set_header X-Security-Tier $auth_security_tier;
                proxy_set_header X-Request-Type "input";
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Request-ID $request_id;
                proxy_set_header Host $http_host;
                
                # First evaluate with Llama Guard
                auth_request /auth-llamaguard;
                
                # If safe, proxy to MCPhub
                proxy_pass http://mcphub_cluster;
                proxy_timeout 30s;
                proxy_connect_timeout 5s;
                proxy_read_timeout 30s;
                proxy_send_timeout 30s;
                
                # Security: Validate response
                proxy_hide_header X-Powered-By;
                proxy_hide_header Server;
            }
            
            # Other API endpoints
            proxy_pass http://mcphub_cluster;
            proxy_set_header X-Customer-ID $auth_customer_id;
            proxy_set_header X-Security-Tier $auth_security_tier;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Host $http_host;
        }
        
        # Security evaluation endpoint - Authenticated
        location /security/evaluate {
            auth_request /auth-jwt;
            auth_request_set $auth_customer_id $upstream_http_x_customer_id;
            
            limit_req zone=basic_tier burst=20 nodelay;
            
            proxy_pass http://llamaguard_api_cluster/evaluate;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Customer-ID $auth_customer_id;
            proxy_set_header Host $http_host;
        }
        
        # Health check endpoint - No auth required
        location /health {
            access_log off;
            add_header Content-Type application/json;
            add_header X-Request-ID $request_id;
            return 200 '{"status":"healthy","service":"ai-agency-security-gateway","timestamp":"$time_iso8601","request_id":"$request_id"}';
        }
        
        # Security statistics - Authenticated admin only
        location /security/stats {
            auth_request /auth-jwt;
            auth_request_set $auth_role $upstream_http_x_user_role;
            
            # Only allow admin access
            if ($auth_role != "admin") {
                return 403 "Admin access required";
            }
            
            limit_req zone=basic_tier burst=5 nodelay;
            
            proxy_pass http://llamaguard_api_cluster/stats;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }
        
        # Internal auth endpoint for Llama Guard evaluation
        location = /auth-llamaguard {
            internal;
            proxy_pass http://llamaguard_api_cluster/evaluate;
            proxy_pass_request_body on;
            proxy_set_header Content-Length $http_content_length;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Customer-ID $auth_customer_id;
            proxy_set_header X-Security-Tier $auth_security_tier;
            proxy_set_header X-Request-Type "input";
            proxy_set_header X-Request-ID $request_id;
        }

        # Block common attack vectors
        location ~* /(wp-admin|wp-login|phpMyAdmin|admin|administrator|phpmyadmin|mysql|dbadmin) {
            access_log /var/log/nginx/blocked.log security_enhanced;
            return 444;
        }
        
        # Block file extensions that shouldn't be accessed
        location ~* \.(exe|bat|sh|cgi|pl|py|rb|lua|asp|aspx|jsp|php)$ {
            access_log /var/log/nginx/blocked.log security_enhanced;
            return 444;
        }
        
        # Block suspicious patterns
        location ~* (base64_encode|base64_decode|eval\(|union.*select|insert.*into) {
            access_log /var/log/nginx/blocked.log security_enhanced;
            return 444;
        }
        
        # Block suspicious user agents
        if ($http_user_agent ~* (sqlmap|nikto|nmap|w3af|skipfish|openvas|nessus|masscan|zap)) {
            access_log /var/log/nginx/blocked.log security_enhanced;
            return 444;
        }
        
        # Block requests with no user agent
        if ($http_user_agent = "") {
            access_log /var/log/nginx/blocked.log security_enhanced;
            return 444;
        }
        
        # Security: Block requests with suspicious headers
        if ($http_x_forwarded_for ~* (union|select|insert|cast|set|declare|drop|update|exec|script)) {
            access_log /var/log/nginx/blocked.log security_enhanced;
            return 403;
        }
        
        # Error pages with security information removed
        error_page 400 401 403 404 /40x.html;
        location = /40x.html {
            root /usr/share/nginx/html;
            internal;
            add_header X-Request-ID $request_id;
        }
        
        error_page 429 /429.html;
        location = /429.html {
            root /usr/share/nginx/html;
            internal;
            add_header X-Request-ID $request_id;
            add_header Retry-After 60;
        }
        
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
            add_header X-Request-ID $request_id;
        }
    }

    # HTTPS Server Block (Production)
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;
        
        # SSL Configuration - Enhanced Security
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        
        # HSTS with preload
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        
        # Additional security headers for HTTPS
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy $security_headers_csp always;
        
        # Include same location blocks as HTTP server
        include /etc/nginx/conf.d/security_locations.conf;
    }
}

# Security Enhancement Notes:
