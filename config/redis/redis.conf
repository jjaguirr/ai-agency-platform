# AI Agency Platform - Redis Production Configuration
# Customer-specific Redis instance configuration

# Basic Configuration
bind 0.0.0.0
port 6379
protected-mode no
timeout 300
tcp-keepalive 300

# Memory Management
maxmemory 1gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Persistence
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename customer_redis.rdb

# Append Only File
appendonly yes
appendfilename "customer_redis.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log
syslog-enabled yes
syslog-ident redis

# Security
requirepass changeme_in_production

# Client Configuration
tcp-backlog 511
databases 16

# Performance Tuning
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000

# Customer Isolation (Namespace Prefix)
# All keys will be prefixed with customer ID
# Example: customer_12345:session:abc123

# Production Optimizations
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes

# Memory Usage Reporting
# This helps with monitoring per-customer memory usage