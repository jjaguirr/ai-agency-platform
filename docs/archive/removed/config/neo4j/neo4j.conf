# AI Agency Platform - Neo4j Production Configuration
# Customer-specific graph database for Mem0 relationship storage

#*****************************************************************
# Network connector configuration
#*****************************************************************

# HTTP Connector
server.http.enabled=true
server.http.listen_address=0.0.0.0:7474

# HTTPS Connector (disabled by default)
server.https.enabled=false

# Bolt connector
server.bolt.enabled=true
server.bolt.listen_address=0.0.0.0:7687

#*****************************************************************
# Memory settings
#*****************************************************************

# Initial heap size
server.memory.heap.initial_size=512m

# Maximum heap size  
server.memory.heap.max_size=1G

# Page cache size (for graph data)
server.memory.pagecache.size=256m

#*****************************************************************
# Database configuration
#*****************************************************************

# Default database name (customer-specific)
server.default_database=customer_graph

# Transaction timeout
db.transaction.timeout=60s

# Query timeout
db.transaction.query.timeout=60s

#*****************************************************************
# Security configuration
#*****************************************************************

# Authentication and authorization
dbms.security.auth_enabled=true

# Customer isolation - each instance is already isolated by Docker
# Additional security through network isolation

#*****************************************************************
# Performance tuning
#*****************************************************************

# Checkpoint settings
db.checkpoint.interval.time=5m
db.checkpoint.interval.tx=100000

# Transaction log settings
db.tx_log.rotation.retention_policy=7 days
db.tx_log.rotation.size=250M

#*****************************************************************
# Logging configuration
#*****************************************************************

# Query logging (for monitoring)
db.logs.query.enabled=false
db.logs.query.threshold=0
db.logs.query.allocation_logging_enabled=false

# Security event logging
dbms.logs.security.level=INFO

#*****************************************************************
# Memory optimization
#*****************************************************************

# String block size optimization
db.format=aligned

# Relationship index sampling
db.index_sampling.background_enabled=true
db.index_sampling.update_percentage=5

#*****************************************************************
# Customer-specific settings
#*****************************************************************

# Customer data isolation notes:
# - Each customer gets dedicated Neo4j instance
# - Database name includes customer ID  
# - No cross-customer relationship access possible
# - Graph relationships are customer-scoped

# Mem0 integration settings:
# - Stores semantic relationships between memories
# - Business context connections
# - Conversation flow graphs
# - Knowledge relationship mapping

#*****************************************************************
# Backup and maintenance
#*****************************************************************

# Enable online backup
dbms.backup.enabled=true

# Backup location
dbms.backup.default_location=/backups

#*****************************************************************
# Monitoring
#*****************************************************************

# Metrics collection
server.metrics.enabled=true
server.metrics.csv.enabled=false
server.metrics.prometheus.enabled=true
server.metrics.prometheus.endpoint=0.0.0.0:2004