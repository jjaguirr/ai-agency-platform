# AI Agency Platform Monitoring Infrastructure
# Infrastructure Engineer: Production-grade monitoring for dual-agent system

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-agency-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - ai-agency-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: ai-agency-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=redis-datasource,postgres-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/monitoring/grafana:/etc/grafana/provisioning
    networks:
      - ai-agency-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: ai-agency-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://ai-agency-redis:6379
    networks:
      - ai-agency-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ai-agency-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://mcphub:mcphub_password@ai-agency-postgres:5432/mcphub?sslmode=disable
    networks:
      - ai-agency-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ai-agency-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - ai-agency-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ai-agency-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./config/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    networks:
      - ai-agency-network

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  ai-agency-network:
    external: true