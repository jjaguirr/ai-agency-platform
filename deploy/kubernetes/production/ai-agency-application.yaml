# AI Agency Platform - Production Application Deployment
# Scalable deployment configuration for customer-specific MCP servers

---
# Customer-Specific MCP Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agency-mcp-server
  namespace: ai-agency-production
  labels:
    app: ai-agency-platform
    component: mcp-server
    version: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ai-agency-platform
      component: mcp-server
  template:
    metadata:
      labels:
        app: ai-agency-platform
        component: mcp-server
        version: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ai-agency-production-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mcp-server
        image: ai-agency-mcp-server:production
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        - containerPort: 9091
          name: metrics
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: CUSTOMER_ID
          valueFrom:
            secretKeyRef:
              name: customer-secrets
              key: customer-id
        - name: CUSTOMER_TIER
          valueFrom:
            secretKeyRef:
              name: customer-secrets
              key: customer-tier
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-secrets
              key: redis-url
        - name: QDRANT_URL
          valueFrom:
            secretKeyRef:
              name: qdrant-secrets
              key: qdrant-url
        - name: NEO4J_URL
          valueFrom:
            secretKeyRef:
              name: neo4j-secrets
              key: neo4j-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: security-secrets
              key: jwt-secret
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: security-secrets
              key: encryption-key
        - name: VAULT_ADDR
          value: "http://vault.ai-agency-production.svc.cluster.local:8200"
        - name: VAULT_TOKEN_PATH
          value: "/var/run/vault/token"
        - name: PROMETHEUS_ENABLED
          value: "true"
        - name: TRACING_ENABLED
          value: "true"
        - name: LOG_LEVEL
          value: "info"
        volumeMounts:
        - name: vault-token
          mountPath: /var/run/vault
          readOnly: true
        - name: customer-data
          mountPath: /app/data
        - name: customer-config
          mountPath: /app/config
        - name: customer-workflows
          mountPath: /app/workflows
        - name: logs
          mountPath: /app/logs
        - name: tmp-volume
          mountPath: /tmp
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /readiness
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      volumes:
      - name: vault-token
        emptyDir:
          medium: Memory
      - name: customer-data
        persistentVolumeClaim:
          claimName: customer-data-pvc
      - name: customer-config
        configMap:
          name: customer-config
      - name: customer-workflows
        persistentVolumeClaim:
          claimName: customer-workflows-pvc
      - name: logs
        persistentVolumeClaim:
          claimName: customer-logs-pvc
      - name: tmp-volume
        emptyDir:
          medium: Memory
          sizeLimit: 512Mi

---
# Customer-Specific MCP Server Service
apiVersion: v1
kind: Service
metadata:
  name: ai-agency-mcp-server
  namespace: ai-agency-production
  labels:
    app: ai-agency-platform
    component: mcp-server
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  - port: 9091
    targetPort: 9091
    protocol: TCP
    name: metrics
  selector:
    app: ai-agency-platform
    component: mcp-server

---
# Customer-Specific Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-agency-mcp-server-hpa
  namespace: ai-agency-production
  labels:
    app: ai-agency-platform
    component: mcp-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-agency-mcp-server
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

---
# Customer-Specific Service Monitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-agency-mcp-server-monitor
  namespace: ai-agency-production
  labels:
    app: ai-agency-platform
    component: mcp-server
spec:
  selector:
    matchLabels:
      app: ai-agency-platform
      component: mcp-server
  endpoints:
  - port: metrics
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    honorLabels: true
    metricRelabelings:
    - sourceLabels: [customer_id]
      targetLabel: customer_id
    - sourceLabels: [__name__]
      regex: '(mcp_server_.+)'
      replacement: '${1}'
      targetLabel: __name__

---
# Customer-Specific Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-agency-mcp-server-netpol
  namespace: ai-agency-production
  labels:
    app: ai-agency-platform
    component: mcp-server
spec:
  podSelector:
    matchLabels:
      app: ai-agency-platform
      component: mcp-server
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ai-agency-production
    - podSelector:
        matchLabels:
          app: ai-agency-platform
    ports:
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: 9091
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: ai-agency-platform
    ports:
    - protocol: TCP
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443