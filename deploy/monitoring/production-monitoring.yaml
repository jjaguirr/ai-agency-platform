# Production Monitoring Stack for AI Agency Platform
# Comprehensive monitoring for 500+ customers with per-customer metrics

---
# Prometheus Server for Metrics Collection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-server
  namespace: ai-agency-production
  labels:
    app: ai-agency-platform
    component: prometheus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-agency-platform
      component: prometheus
  template:
    metadata:
      labels:
        app: ai-agency-platform
        component: prometheus
    spec:
      serviceAccountName: prometheus-server
      containers:
      - name: prometheus
        image: prom/prometheus:v2.45.0
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus/'
          - '--web.console.libraries=/etc/prometheus/console_libraries'
          - '--web.console.templates=/etc/prometheus/consoles'
          - '--storage.tsdb.retention.time=30d'
          - '--storage.tsdb.retention.size=50GB'
          - '--web.enable-lifecycle'
          - '--web.enable-admin-api'
          - '--query.max-concurrency=100'
          - '--query.max-samples=50000000'
        ports:
        - containerPort: 9090
          name: web
        resources:
          requests:
            cpu: "2000m"
            memory: "8Gi"
          limits:
            cpu: "4000m"
            memory: "16Gi"
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
        - name: prometheus-data
          mountPath: /prometheus
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
      - name: prometheus-data
        persistentVolumeClaim:
          claimName: prometheus-data

---
# Grafana for Metrics Visualization
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: ai-agency-production
  labels:
    app: ai-agency-platform
    component: grafana
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-agency-platform
      component: grafana
  template:
    metadata:
      labels:
        app: ai-agency-platform
        component: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.0.0
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-secrets
              key: admin_password
        - name: GF_DATABASE_TYPE
          value: "postgres"
        - name: GF_DATABASE_HOST
          value: "postgres-primary.ai-agency-production.svc.cluster.local:5432"
        - name: GF_DATABASE_NAME
          value: "grafana"
        - name: GF_DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: grafana-secrets
              key: db_user
        - name: GF_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-secrets
              key: db_password
        - name: GF_INSTALL_PLUGINS
          value: "grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel"
        - name: GF_FEATURE_TOGGLES_ENABLE
          value: "publicDashboards"
        ports:
        - containerPort: 3000
          name: grafana
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        volumeMounts:
        - name: grafana-data
          mountPath: /var/lib/grafana
        - name: grafana-provisioning
          mountPath: /etc/grafana/provisioning
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 5
      volumes:
      - name: grafana-data
        persistentVolumeClaim:
          claimName: grafana-data
      - name: grafana-provisioning
        configMap:
          name: grafana-provisioning

---
# AlertManager for Alert Management
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: ai-agency-production
  labels:
    app: ai-agency-platform
    component: alertmanager
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-agency-platform
      component: alertmanager
  template:
    metadata:
      labels:
        app: ai-agency-platform
        component: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.25.0
        args:
          - '--config.file=/etc/alertmanager/alertmanager.yml'
          - '--storage.path=/alertmanager'
          - '--data.retention=120h'
          - '--cluster.listen-address=0.0.0.0:9094'
          - '--cluster.peer=alertmanager-0.alertmanager.ai-agency-production.svc.cluster.local:9094'
          - '--cluster.peer=alertmanager-1.alertmanager.ai-agency-production.svc.cluster.local:9094'
          - '--cluster.peer=alertmanager-2.alertmanager.ai-agency-production.svc.cluster.local:9094'
        ports:
        - containerPort: 9093
          name: web
        - containerPort: 9094
          name: cluster
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: alertmanager-config
          mountPath: /etc/alertmanager
        - name: alertmanager-data
          mountPath: /alertmanager
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9093
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9093
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: alertmanager-config
        configMap:
          name: alertmanager-config
      - name: alertmanager-data
        persistentVolumeClaim:
          claimName: alertmanager-data

---
# Cost Tracking and Analytics Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-analytics
  namespace: ai-agency-production
  labels:
    app: ai-agency-platform
    component: cost-analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-agency-platform
      component: cost-analytics
  template:
    metadata:
      labels:
        app: ai-agency-platform
        component: cost-analytics
    spec:
      containers:
      - name: cost-analytics
        image: ai-agency-platform/cost-analytics:v1.0.0
        env:
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secrets
              key: connection_url
        - name: PROMETHEUS_URL
          value: "http://prometheus-server.ai-agency-production.svc.cluster.local:9090"
        - name: REDIS_URL
          value: "redis://redis-cluster.ai-agency-production.svc.cluster.local:6379"
        - name: COST_TRACKING_INTERVAL
          value: "300" # 5 minutes
        - name: AI_PROVIDER_APIS
          valueFrom:
            secretKeyRef:
              name: ai-provider-secrets
              key: api_endpoints
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        volumeMounts:
        - name: cost-data
          mountPath: /app/data
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: cost-data
        persistentVolumeClaim:
          claimName: cost-analytics-data

---
