[alembic]
# Migration scripts live here.
script_location = alembic

# Filename template — date-prefixed for ls-sorting, slug for grep-ability.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Local timestamps in filenames; CI/dev are both Pacific so this avoids
# the "why is the date one day off" git-blame question.
timezone = UTC

# DSN comes from env (DATABASE_URL or POSTGRES_*), not hardcoded here.
# env.py reads it. Leaving the key present-but-empty means "config has
# the key, env.py overrides it" — slightly cleaner than deleting it
# and having env.py call config.set_main_option on a missing key.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
